<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Pact Infinity</title>
    
    <!-- Libraries & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Link to our Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body style="--bg-color: #0a0a0a;">
    <!-- Orientation Warning Overlay -->
    <div id="orientation-overlay" class="fixed inset-0 z-[2000] bg-[#0a0a0a] flex flex-col items-center justify-center p-10 text-center pointer-events-none opacity-0 transition-opacity duration-300">
        <div class="relative w-20 h-20 mb-8">
            <i data-lucide="smartphone" class="w-20 h-20 text-[#e82a50] rotate-0 anim-rotate-device"></i>
        </div>
        <h2 class="font-cinematic text-2xl text-white mb-2 uppercase tracking-widest">Portrait Mode Recommended</h2>
        <p class="text-zinc-500 text-[10px] uppercase tracking-widest leading-loose">Please rotate your device for the best experience.</p>
    </div>

    <!-- Background Canvas -->
    <canvas id="floatCanvas" class="fixed inset-0 pointer-events-none z-0"></canvas>

    <!-- Global Navigation -->
    <div id="nav-header" class="fixed top-6 left-6 right-6 z-[100] flex justify-between items-center opacity-0 pointer-events-none transition-opacity duration-300">
        <button onclick="goBack()" class="flex items-center gap-2 text-zinc-500 hover:text-white transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span class="text-[10px] uppercase tracking-widest font-bold">Back</span>
        </button>
        
        <div class="flex items-center gap-2">
            <!-- Mute Button -->
            <button onclick="toggleMute()" class="p-2 text-zinc-500 hover:text-white transition-colors">
                <span id="icon-unmuted"><i data-lucide="volume-2" class="w-5 h-5"></i></span>
                <span id="icon-muted" class="hidden"><i data-lucide="volume-x" class="w-5 h-5"></i></span>
            </button>
            
            <!-- Fullscreen Button -->
            <button onclick="toggleFullScreen()" class="p-2 text-zinc-500 hover:text-white transition-colors">
                <i data-lucide="maximize" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="relative z-10 w-full h-full flex flex-col overflow-hidden"></div>

    <!-- Load Data and Logic Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
